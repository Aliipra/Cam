<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>تسجيل فيديو أفقي MP4 من الكاميرا الأمامية</title>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 16px;
      font-family: Arial, sans-serif;
      direction: rtl;
      background: #f3f5f7;
      color: #111;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #fff;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 6px 24px rgba(0,0,0,.08);
    }

    h1 {
      margin: 0 0 14px;
      font-size: 22px;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      font-weight: 700;
    }

    input, button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 12px;
      font-size: 16px;
      border: 1px solid #d7dbe0;
    }

    button {
      margin-top: 12px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #0f766e;
    }

    button:disabled {
      opacity: .65;
      cursor: not-allowed;
    }

    .preview-wrap {
      margin-top: 14px;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }

    .status {
      margin-top: 12px;
      min-height: 24px;
      font-size: 15px;
      line-height: 1.6;
    }

    .hint {
      margin-top: 10px;
      font-size: 14px;
      color: #4b5563;
      line-height: 1.7;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(20px);
      background: rgba(17, 24, 39, .95);
      color: #fff;
      padding: 12px 16px;
      border-radius: 999px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease;
      z-index: 9999;
      max-width: calc(100vw - 24px);
      text-align: center;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .videos {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 14px;
    }

    .card {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 12px;
      background: #fafafa;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 16px;
      word-break: break-word;
    }

    .card video {
      width: 100%;
      border-radius: 12px;
      background: #000;
      aspect-ratio: 16 / 9;
      object-fit: contain;
    }

    .card a {
      display: inline-block;
      width: 100%;
      margin-top: 10px;
      text-align: center;
      text-decoration: none;
      background: #2563eb;
      color: #fff;
      padding: 10px 12px;
      border-radius: 12px;
      box-sizing: border-box;
    }

    video.hidden-source {
      position: absolute;
      left: -9999px;
      top: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>تسجيل فيديو أفقي MP4 من الكاميرا الأمامية</h1>

    <label for="videoCount">عدد الفيديوهات</label>
    <input id="videoCount" type="number" min="1" value="1" />

    <label for="videoDuration">مدة كل فيديو بالثواني</label>
    <input id="videoDuration" type="number" min="1" value="3" />

    <label for="gapSeconds">الفاصل بين كل فيديو وآخر (1 أو 2 ثانية)</label>
    <input id="gapSeconds" type="number" min="1" max="2" step="1" value="1" />

    <button id="startBtn">ابدأ التسجيل</button>
    <button id="downloadAllBtn" class="secondary" disabled>تحميل جميع الفيديوهات ZIP</button>

    <div class="status" id="status">جاهز...</div>

    <div class="preview-wrap">
      <canvas id="previewCanvas" width="1280" height="720"></canvas>
    </div>

    <div class="hint">
      المعاينة والتسجيل أفقيان دائمًا.  
      كل فيديو يُحفظ داخل الصفحة أولًا بصيغة MP4، ثم يمكنك تحميله منفردًا أو تحميل الجميع دفعة واحدة.
    </div>

    <div class="videos" id="videosList"></div>
  </div>

  <div id="toast" class="toast"></div>

  <video id="sourceVideo" class="hidden-source" playsinline autoplay muted></video>

  <script type="module">
    import { FFmpeg } from "https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/+esm";
    import { fetchFile, toBlobURL } from "https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/+esm";

    const previewCanvas = document.getElementById("previewCanvas");
    const ctx = previewCanvas.getContext("2d");
    const sourceVideo = document.getElementById("sourceVideo");
    const startBtn = document.getElementById("startBtn");
    const downloadAllBtn = document.getElementById("downloadAllBtn");
    const statusEl = document.getElementById("status");
    const videosList = document.getElementById("videosList");
    const videoCountInput = document.getElementById("videoCount");
    const videoDurationInput = document.getElementById("videoDuration");
    const gapSecondsInput = document.getElementById("gapSeconds");
    const toastEl = document.getElementById("toast");

    const ffmpeg = new FFmpeg();
    let ffmpegLoaded = false;
    let ffmpegLogAttached = false;

    let stream = null;
    let canvasStream = null;
    let recordingStream = null;
    let renderRunning = false;
    let toastTimer = null;
    let recordings = [];

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function showToast(message, duration = 1400) {
      toastEl.textContent = message;
      toastEl.classList.add("show");

      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toastEl.classList.remove("show");
      }, duration);
    }

    function pickMimeType() {
      if (!window.MediaRecorder) return "";

      const types = [
        "video/webm;codecs=vp9,opus",
        "video/webm;codecs=vp8,opus",
        "video/webm",
        "video/mp4"
      ];

      for (const type of types) {
        if (MediaRecorder.isTypeSupported(type)) {
          return type;
        }
      }
      return "";
    }

    async function ensureFFmpegLoaded() {
      if (ffmpegLoaded) return;

      if (!ffmpegLogAttached) {
        ffmpeg.on("log", ({ message }) => {
          console.log(message);
        });
        ffmpegLogAttached = true;
      }

      statusEl.textContent = "جارٍ تحميل محرك تحويل الفيديو...";
      showToast("جارٍ تحميل محرك التحويل...");

      const baseURL = "https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.10/dist/umd";

      await ffmpeg.load({
        coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, "text/javascript"),
        wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, "application/wasm")
      });

      ffmpegLoaded = true;
    }

    async function startCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        throw new Error("المتصفح لا يدعم الوصول إلى الكاميرا.");
      }

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "user" }
          },
          audio: true
        });
      } catch (err) {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "user" }
          },
          audio: false
        });
      }

      sourceVideo.srcObject = stream;

      try {
        await sourceVideo.play();
      } catch (_) {}
    }

    function startRenderLoop() {
      if (renderRunning) return;
      renderRunning = true;

      const draw = () => {
        const cw = previewCanvas.width;
        const ch = previewCanvas.height;

        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, cw, ch);

        if (sourceVideo.readyState >= 2 && sourceVideo.videoWidth && sourceVideo.videoHeight) {
          const vw = sourceVideo.videoWidth;
          const vh = sourceVideo.videoHeight;

          if (vh > vw) {
            const scale = Math.min(cw / vh, ch / vw);

            ctx.save();
            ctx.translate(cw / 2, ch / 2);
            ctx.rotate(-Math.PI / 2);

            ctx.drawImage(
              sourceVideo,
              -vw * scale / 2,
              -vh * scale / 2,
              vw * scale,
              vh * scale
            );

            ctx.restore();
          } else {
            const scale = Math.min(cw / vw, ch / vh);
            const dw = vw * scale;
            const dh = vh * scale;
            const dx = (cw - dw) / 2;
            const dy = (ch - dh) / 2;

            ctx.drawImage(sourceVideo, dx, dy, dw, dh);
          }
        }

        requestAnimationFrame(draw);
      };

      requestAnimationFrame(draw);
    }

    function getCanvasStream() {
      if (!canvasStream) {
        canvasStream = previewCanvas.captureStream(30);
      }
      return canvasStream;
    }

    function getRecordingStream() {
      const canvasTracks = getCanvasStream().getVideoTracks();
      const audioTracks = stream ? stream.getAudioTracks() : [];
      recordingStream = new MediaStream([...canvasTracks, ...audioTracks]);
      return recordingStream;
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function addRecordingToPage(blob, filename) {
      const url = URL.createObjectURL(blob);

      const card = document.createElement("div");
      card.className = "card";

      const title = document.createElement("h3");
      title.textContent = filename;

      const video = document.createElement("video");
      video.controls = true;
      video.src = url;

      const downloadBtn = document.createElement("a");
      downloadBtn.href = url;
      downloadBtn.download = filename;
      downloadBtn.textContent = "تحميل هذا الفيديو";

      card.appendChild(title);
      card.appendChild(video);
      card.appendChild(downloadBtn);

      videosList.appendChild(card);

      recordings.push({
        blob,
        filename,
        url
      });

      downloadAllBtn.disabled = recordings.length === 0;
    }

    async function convertWebmToMp4(webmBlob, outputName) {
      await ensureFFmpegLoaded();

      const inputName = "input.webm";
      const outputFile = "output.mp4";

      await ffmpeg.writeFile(inputName, await fetchFile(webmBlob));

      await ffmpeg.exec([
        "-i", inputName,
        "-c:v", "libx264",
        "-preset", "veryfast",
        "-pix_fmt", "yuv420p",
        "-movflags", "+faststart",
        "-c:a", "aac",
        "-b:a", "128k",
        outputFile
      ]);

      const data = await ffmpeg.readFile(outputFile);
      const mp4Blob = new Blob([data], { type: "video/mp4" });

      return {
        blob: mp4Blob,
        filename: outputName
      };
    }

    async function recordOneVideo(index, totalCount, durationMs) {
      return new Promise((resolve, reject) => {
        try {
          const chunks = [];
          const mimeType = pickMimeType();
          const options = mimeType ? { mimeType } : undefined;
          const recorder = new MediaRecorder(getRecordingStream(), options);

          recorder.ondataavailable = (event) => {
            if (event.data && event.data.size > 0) {
              chunks.push(event.data);
            }
          };

          recorder.onerror = (event) => {
            reject(event.error || new Error("فشل التسجيل"));
          };

          recorder.onstop = async () => {
            try {
              const browserMime = mimeType || recorder.mimeType || "video/webm";
              const webmBlob = new Blob(chunks, { type: browserMime });

              statusEl.textContent = `جارٍ تحويل الفيديو ${index + 1} من ${totalCount} إلى MP4...`;
              showToast(`جارٍ تحويل الفيديو ${index + 1} إلى MP4`);

              const { blob: mp4Blob, filename } = await convertWebmToMp4(
                webmBlob,
                `video_${index + 1}.mp4`
              );

              statusEl.textContent = `تم حفظ الفيديو ${index + 1} داخل الصفحة بصيغة MP4.`;
              showToast(`تم حفظ الفيديو ${index + 1}`);

              addRecordingToPage(mp4Blob, filename);
              resolve();
            } catch (err) {
              reject(err);
            }
          };

          statusEl.textContent = `بدأ تسجيل الفيديو ${index + 1} من ${totalCount} لمدة ${durationMs / 1000} ثانية...`;
          showToast(`بدأ تسجيل الفيديو ${index + 1} من ${totalCount}`);

          recorder.start();

          setTimeout(() => {
            if (recorder.state !== "inactive") {
              recorder.stop();
            }
          }, durationMs);
        } catch (err) {
          reject(err);
        }
      });
    }

    downloadAllBtn.addEventListener("click", async () => {
      if (!recordings.length) return;

      try {
        if (!window.JSZip) {
          showToast("تعذر إنشاء ZIP لأن المكتبة لم تُحمّل.");
          return;
        }

        startBtn.disabled = true;
        downloadAllBtn.disabled = true;
        statusEl.textContent = "جارٍ تجهيز ملف ZIP لجميع الفيديوهات...";
        showToast("جارٍ تجهيز ملف ZIP...");

        const zip = new JSZip();
        const folder = zip.folder("videos");

        for (const item of recordings) {
          folder.file(item.filename, item.blob);
        }

        const zipBlob = await zip.generateAsync({ type: "blob" });
        downloadBlob(zipBlob, "all_videos.zip");

        statusEl.textContent = "تم تحميل جميع الفيديوهات بنجاح.";
        showToast("تم تحميل جميع الفيديوهات");
      } catch (err) {
        console.error(err);
        statusEl.textContent = `حدث خطأ أثناء إنشاء ZIP: ${err.message || err}`;
        showToast(`حدث خطأ: ${err.message || err}`, 2500);
      } finally {
        startBtn.disabled = false;
        downloadAllBtn.disabled = recordings.length === 0;
      }
    });

    startBtn.addEventListener("click", async () => {
      const count = parseInt(videoCountInput.value, 10);
      const durationSec = parseInt(videoDurationInput.value, 10);
      const gapSec = parseInt(gapSecondsInput.value, 10);

      if (!count || count < 1) {
        showToast("أدخل عددًا صحيحًا أكبر من 0");
        return;
      }

      if (!durationSec || durationSec < 1) {
        showToast("أدخل مدة صحيحة أكبر من 0");
        return;
      }

      if (gapSec !== 1 && gapSec !== 2) {
        showToast("الفاصل يجب أن يكون 1 أو 2 ثانية");
        return;
      }

      recordings = [];
      videosList.innerHTML = "";
      downloadAllBtn.disabled = true;
      startBtn.disabled = true;

      try {
        statusEl.textContent = "جارٍ فتح الكاميرا الأمامية...";
        showToast("جارٍ فتح الكاميرا...");

        if (!stream) {
          await startCamera();
          startRenderLoop();
        }

        const durationMs = durationSec * 1000;
        const gapMs = gapSec * 1000;

        for (let i = 0; i < count; i++) {
          await recordOneVideo(i, count, durationMs);

          if (i < count - 1) {
            statusEl.textContent = `فاصل ${gapSec} ثانية قبل الفيديو التالي...`;
            showToast(`فاصل ${gapSec} ثانية`);
            await sleep(gapMs);
          }
        }

        statusEl.textContent = "تم تسجيل جميع الفيديوهات وحفظها داخل الصفحة.";
        showToast("تم تسجيل جميع الفيديوهات");
        downloadAllBtn.disabled = recordings.length === 0;
      } catch (err) {
        console.error(err);
        const msg = `${err.name || "Error"}: ${err.message || err}`;
        statusEl.textContent = `حدث خطأ: ${msg}`;
        showToast(msg, 2500);
      } finally {
        startBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
