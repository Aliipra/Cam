<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>تسجيل فيديو MP4 من الكاميرا الأمامية</title>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --primary: #2563eb;
      --secondary: #0f766e;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 12px;
      font-family: Arial, sans-serif;
      direction: rtl;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      background: var(--card);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 6px 24px rgba(0,0,0,.08);
    }

    h1 {
      margin: 0 0 14px;
      font-size: 20px;
      line-height: 1.4;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      font-weight: 700;
      font-size: 15px;
    }

    input, button {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      font-size: 16px;
      border: 1px solid var(--border);
      outline: none;
    }

    input {
      background: #fff;
    }

    button {
      border: none;
      margin-top: 10px;
      font-weight: 700;
      color: #fff;
      background: var(--primary);
      touch-action: manipulation;
    }

    button.secondary {
      background: var(--secondary);
    }

    button:disabled {
      opacity: .65;
      cursor: not-allowed;
    }

    .preview-wrap {
      margin-top: 14px;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }

    .status {
      margin-top: 12px;
      min-height: 24px;
      font-size: 15px;
      line-height: 1.6;
      color: var(--text);
    }

    .hint {
      margin-top: 10px;
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%) translateY(18px);
      background: rgba(17, 24, 39, .96);
      color: #fff;
      padding: 12px 16px;
      border-radius: 999px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease, transform .25s ease;
      z-index: 9999;
      max-width: calc(100vw - 20px);
      text-align: center;
      word-break: break-word;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .videos {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      background: #fafafa;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 15px;
      word-break: break-word;
    }

    .card video {
      width: 100%;
      border-radius: 12px;
      background: #000;
      aspect-ratio: 16 / 9;
      object-fit: contain;
    }

    .card a {
      display: inline-block;
      width: 100%;
      margin-top: 10px;
      text-align: center;
      text-decoration: none;
      background: var(--primary);
      color: #fff;
      padding: 11px 12px;
      border-radius: 12px;
      box-sizing: border-box;
    }

    video.hidden-source {
      position: absolute;
      left: -9999px;
      top: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>تسجيل فيديو MP4 من الكاميرا الأمامية بدون صوت</h1>

    <label for="videoCount">عدد الفيديوهات</label>
    <input id="videoCount" type="number" min="1" value="1" />

    <label for="videoDuration">مدة كل فيديو بالثواني</label>
    <input id="videoDuration" type="number" min="1" value="3" />

    <label for="gapSeconds">الفاصل بين الفيديوهات (1 أو 2 ثانية)</label>
    <input id="gapSeconds" type="number" min="1" max="2" step="1" value="1" />

    <button id="startBtn">ابدأ التسجيل</button>
    <button id="downloadAllBtn" class="secondary" disabled>تحميل الجميع ZIP</button>

    <div class="status" id="status">جاهز...</div>

    <div class="preview-wrap">
      <canvas id="previewCanvas" width="1280" height="720"></canvas>
    </div>

    <div class="hint">
      هذه النسخة مهيأة للموبايل وبدون صوت نهائيًا. يتم التسجيل أولًا بصيغة WebM ثم التحويل إلى MP4 داخل الصفحة.
    </div>

    <div class="videos" id="videosList"></div>
  </div>

  <div id="toast" class="toast"></div>

  <video id="sourceVideo" class="hidden-source" playsinline autoplay muted></video>

  <script type="module">
    import { FFmpeg } from "https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/+esm";
    import { fetchFile, toBlobURL } from "https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/+esm";

    const previewCanvas = document.getElementById("previewCanvas");
    const ctx = previewCanvas.getContext("2d");
    const sourceVideo = document.getElementById("sourceVideo");
    const startBtn = document.getElementById("startBtn");
    const downloadAllBtn = document.getElementById("downloadAllBtn");
    const statusEl = document.getElementById("status");
    const videosList = document.getElementById("videosList");
    const videoCountInput = document.getElementById("videoCount");
    const videoDurationInput = document.getElementById("videoDuration");
    const gapSecondsInput = document.getElementById("gapSeconds");
    const toastEl = document.getElementById("toast");

    const ffmpeg = new FFmpeg();
    let ffmpegLoaded = false;
    let ffmpegLoadingPromise = null;
    let ffmpegLogAttached = false;

    let stream = null;
    let canvasStream = null;
    let renderRunning = false;
    let toastTimer = null;
    let recordings = [];

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function showToast(message, duration = 1400) {
      toastEl.textContent = message;
      toastEl.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toastEl.classList.remove("show");
      }, duration);
    }

    function pickMimeType() {
      if (!window.MediaRecorder) return "";
      const types = [
        "video/webm;codecs=vp9",
        "video/webm;codecs=vp8",
        "video/webm"
      ];
      for (const type of types) {
        if (MediaRecorder.isTypeSupported(type)) return type;
      }
      return "";
    }

    async function ensureFFmpegLoaded() {
      if (ffmpegLoaded) return;
      if (ffmpegLoadingPromise) return ffmpegLoadingPromise;

      ffmpegLoadingPromise = (async () => {
        if (!ffmpegLogAttached) {
          ffmpeg.on("log", ({ message }) => console.log(message));
          ffmpegLogAttached = true;
        }

        statusEl.textContent = "جارٍ تحميل محرك تحويل الفيديو...";
        showToast("جارٍ تحميل محرك التحويل...");

        const baseURL = "https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.10/dist/umd";
        await ffmpeg.load({
          coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, "text/javascript"),
          wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, "application/wasm")
        });

        ffmpegLoaded = true;
      })();

      return ffmpegLoadingPromise;
    }

    async function startCamera() {
      if (!navigator.mediaDevices?.getUserMedia) {
        throw new Error("المتصفح لا يدعم الوصول إلى الكاميرا.");
      }

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "user" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });
      } catch (err) {
        throw new Error("تعذر فتح الكاميرا الأمامية. تأكد من منح الإذن.");
      }

      sourceVideo.srcObject = stream;

      await new Promise((resolve) => {
        if (sourceVideo.readyState >= 1) return resolve();
        sourceVideo.onloadedmetadata = () => resolve();
      });

      try {
        await sourceVideo.play();
      } catch (_) {}
    }

    function startRenderLoop() {
      if (renderRunning) return;
      renderRunning = true;

      const draw = () => {
        const cw = previewCanvas.width;
        const ch = previewCanvas.height;

        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, cw, ch);

        if (sourceVideo.readyState >= 2 && sourceVideo.videoWidth && sourceVideo.videoHeight) {
          const vw = sourceVideo.videoWidth;
          const vh = sourceVideo.videoHeight;

          if (vh > vw) {
            const scale = Math.min(cw / vh, ch / vw);
            const drawW = vh * scale;
            const drawH = vw * scale;

            ctx.save();
            ctx.translate(cw / 2, ch / 2);
            ctx.rotate(-Math.PI / 2);
            ctx.drawImage(sourceVideo, -drawH / 2, -drawW / 2, drawH, drawW);
            ctx.restore();
          } else {
            const scale = Math.min(cw / vw, ch / vh);
            const dw = vw * scale;
            const dh = vh * scale;
            const dx = (cw - dw) / 2;
            const dy = (ch - dh) / 2;
            ctx.drawImage(sourceVideo, dx, dy, dw, dh);
          }
        }

        requestAnimationFrame(draw);
      };

      requestAnimationFrame(draw);
    }

    function getCanvasStream() {
      if (!canvasStream) {
        canvasStream = previewCanvas.captureStream(24);
      }
      return canvasStream;
    }

    function getRecordingStream() {
      const canvasTracks = getCanvasStream().getVideoTracks();
      return new MediaStream([...canvasTracks]);
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1500);
    }

    function addRecordingToPage(blob, filename) {
      const url = URL.createObjectURL(blob);

      const card = document.createElement("div");
      card.className = "card";

      const title = document.createElement("h3");
      title.textContent = filename;

      const video = document.createElement("video");
      video.controls = true;
      video.src = url;

      const downloadBtn = document.createElement("a");
      downloadBtn.href = url;
      downloadBtn.download = filename;
      downloadBtn.textContent = "تحميل هذا الفيديو";

      card.appendChild(title);
      card.appendChild(video);
      card.appendChild(downloadBtn);

      videosList.appendChild(card);

      recordings.push({ blob, filename, url });
      downloadAllBtn.disabled = recordings.length === 0;
    }

    async function convertWebmToMp4(webmBlob, uid) {
      await ensureFFmpegLoaded();

      const inputName = `input_${uid}.webm`;
      const outputName = `output_${uid}.mp4`;

      try {
        await ffmpeg.writeFile(inputName, await fetchFile(webmBlob));

        await ffmpeg.exec([
          "-i", inputName,
          "-c:v", "libx264",
          "-pix_fmt", "yuv420p",
          "-movflags", "+faststart",
          "-an",
          outputName
        ]);

        const data = await ffmpeg.readFile(outputName);
        return new Blob([data], { type: "video/mp4" });
      } finally {
        try { await ffmpeg.deleteFile(inputName); } catch (_) {}
        try { await ffmpeg.deleteFile(outputName); } catch (_) {}
      }
    }

    async function recordOneVideo(index, totalCount, durationMs) {
      return new Promise((resolve, reject) => {
        try {
          const chunks = [];
          const mimeType = pickMimeType();
          const recorder = new MediaRecorder(
            getRecordingStream(),
            mimeType ? { mimeType } : undefined
          );

          recorder.ondataavailable = (event) => {
            if (event.data && event.data.size > 0) {
              chunks.push(event.data);
            }
          };

          recorder.onerror = (event) => {
            reject(event.error || new Error("فشل التسجيل"));
          };

          recorder.onstop = async () => {
            try {
              const webmBlob = new Blob(chunks, { type: recorder.mimeType || "video/webm" });

              statusEl.textContent = `جارٍ تحويل الفيديو ${index + 1} إلى MP4...`;
              showToast(`جارٍ تحويل الفيديو ${index + 1} إلى MP4`);

              let finalBlob;
              let finalName;

              try {
                finalBlob = await convertWebmToMp4(webmBlob, `${Date.now()}_${index + 1}`);
                finalName = `video_${index + 1}.mp4`;
              } catch (convertErr) {
                console.error("MP4 conversion failed:", convertErr);
                finalBlob = webmBlob;
                finalName = `video_${index + 1}.webm`;
                statusEl.textContent = "تعذر التحويل إلى MP4، تم الحفظ بصيغة WebM.";
                showToast("تعذر التحويل إلى MP4، تم الحفظ WebM", 2200);
              }

              addRecordingToPage(finalBlob, finalName);
              statusEl.textContent = `تم حفظ الفيديو ${index + 1}.`;
              showToast(`تم حفظ الفيديو ${index + 1}`);
              resolve();
            } catch (err) {
              reject(err);
            }
          };

          statusEl.textContent = `بدأ تسجيل الفيديو ${index + 1} من ${totalCount} لمدة ${durationMs / 1000} ثانية...`;
          showToast(`بدأ تسجيل الفيديو ${index + 1} من ${totalCount}`);

          recorder.start(1000);

          setTimeout(() => {
            if (recorder.state !== "inactive") {
              recorder.stop();
            }
          }, durationMs);

        } catch (err) {
          reject(err);
        }
      });
    }

    downloadAllBtn.addEventListener("click", async () => {
      if (!recordings.length) return;

      try {
        if (!window.JSZip) {
          showToast("تعذر إنشاء ZIP لأن المكتبة لم تُحمّل.");
          return;
        }

        startBtn.disabled = true;
        downloadAllBtn.disabled = true;
        statusEl.textContent = "جارٍ تجهيز ملف ZIP...";
        showToast("جارٍ تجهيز ملف ZIP...");

        const zip = new JSZip();
        const folder = zip.folder("videos");

        for (const item of recordings) {
          folder.file(item.filename, item.blob);
        }

        const zipBlob = await zip.generateAsync({ type: "blob" });
        downloadBlob(zipBlob, "all_videos.zip");

        statusEl.textContent = "تم تحميل جميع الفيديوهات بنجاح.";
        showToast("تم تحميل جميع الفيديوهات");
      } catch (err) {
        console.error(err);
        statusEl.textContent = `حدث خطأ أثناء إنشاء ZIP: ${err.message || err}`;
        showToast(`حدث خطأ: ${err.message || err}`, 2500);
      } finally {
        startBtn.disabled = false;
        downloadAllBtn.disabled = recordings.length === 0;
      }
    });

    startBtn.addEventListener("click", async () => {
      const count = parseInt(videoCountInput.value, 10);
      const durationSec = parseInt(videoDurationInput.value, 10);
      const gapSec = parseInt(gapSecondsInput.value, 10);

      if (!count || count < 1) {
        showToast("أدخل عددًا صحيحًا أكبر من 0");
        return;
      }

      if (!durationSec || durationSec < 1) {
        showToast("أدخل مدة صحيحة أكبر من 0");
        return;
      }

      if (gapSec !== 1 && gapSec !== 2) {
        showToast("الفاصل يجب أن يكون 1 أو 2 ثانية");
        return;
      }

      recordings = [];
      videosList.innerHTML = "";
      downloadAllBtn.disabled = true;
      startBtn.disabled = true;

      try {
        if (!window.MediaRecorder) {
          throw new Error("المتصفح لا يدعم MediaRecorder.");
        }

        if (!HTMLCanvasElement.prototype.captureStream) {
          throw new Error("المتصفح لا يدعم captureStream على canvas.");
        }

        statusEl.textContent = "جارٍ فتح الكاميرا الأمامية...";
        showToast("جارٍ فتح الكاميرا...");

        if (!stream) {
          await startCamera();
          startRenderLoop();
        }

        const durationMs = durationSec * 1000;
        const gapMs = gapSec * 1000;

        for (let i = 0; i < count; i++) {
          await recordOneVideo(i, count, durationMs);

          if (i < count - 1) {
            statusEl.textContent = `فاصل ${gapSec} ثانية قبل الفيديو التالي...`;
            showToast(`فاصل ${gapSec} ثانية`);
            await sleep(gapMs);
          }
        }

        statusEl.textContent = "تم تسجيل جميع الفيديوهات وحفظها داخل الصفحة.";
        showToast("تم تسجيل جميع الفيديوهات");
        downloadAllBtn.disabled = recordings.length === 0;
      } catch (err) {
        console.error(err);
        const msg = `${err.name || "Error"}: ${err.message || err}`;
        statusEl.textContent = `حدث خطأ: ${msg}`;
        showToast(msg, 2500);
      } finally {
        startBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
