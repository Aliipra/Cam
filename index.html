<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>تسجيل فيديو من الكاميرا الأمامية</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      direction: rtl;
      background: #f3f5f7;
      color: #111;
      padding: 16px;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      background: #fff;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 6px 24px rgba(0,0,0,.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 22px;
    }

    label {
      display: block;
      margin: 10px 0 6px;
      font-weight: 700;
    }

    input, button {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border-radius: 12px;
      font-size: 16px;
      border: 1px solid #d7dbe0;
    }

    button {
      margin-top: 12px;
      border: none;
      background: #2563eb;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .preview-wrap {
      margin-top: 14px;
      width: 100%;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 16 / 9;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    .status {
      margin-top: 12px;
      min-height: 24px;
      font-size: 15px;
      line-height: 1.6;
    }

    .hint {
      margin-top: 10px;
      font-size: 14px;
      color: #4b5563;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>تسجيل فيديو من الكاميرا الأمامية</h1>

    <label for="videoCount">عدد الفيديوهات</label>
    <input id="videoCount" type="number" min="1" value="1" />

    <label for="videoDuration">مدة كل فيديو بالثواني</label>
    <input id="videoDuration" type="number" min="1" value="3" />

    <button id="startBtn">ابدأ التسجيل</button>

    <div class="status" id="status">جاهز...</div>

    <div class="preview-wrap">
      <video id="preview" autoplay playsinline muted></video>
    </div>

    <div class="hint">
      سيتم استخدام الكاميرا الأمامية، وتظهر المعاينة كاملة بدون قص.  
      للحصول على أفضل شكل، افتح الصفحة والموبايل بوضع أفقي.
    </div>
  </div>

  <script>
    const preview = document.getElementById("preview");
    const statusEl = document.getElementById("status");
    const startBtn = document.getElementById("startBtn");
    const videoCountInput = document.getElementById("videoCount");
    const videoDurationInput = document.getElementById("videoDuration");

    let stream = null;

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function pickMimeType() {
      if (!window.MediaRecorder) return "";

      const types = [
        "video/webm;codecs=vp9,opus",
        "video/webm;codecs=vp8,opus",
        "video/webm",
        "video/mp4;codecs=avc1.42E01E,mp4a.40.2",
        "video/mp4"
      ];

      for (const type of types) {
        if (MediaRecorder.isTypeSupported(type)) {
          return type;
        }
      }

      return "";
    }

    async function startCamera() {
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        throw new Error("المتصفح لا يدعم الوصول إلى الكاميرا.");
      }

      stream = await navigator.mediaDevices.getUserMedia({
        video: {
          facingMode: { ideal: "user" }   // الكاميرا الأمامية
        },
        audio: true
      });

      preview.srcObject = stream;

      try {
        await preview.play();
      } catch (_) {}
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    async function recordOneVideo(index, durationMs, totalCount) {
      return new Promise((resolve, reject) => {
        try {
          const chunks = [];
          const mimeType = pickMimeType();
          const options = mimeType ? { mimeType } : undefined;

          const recorder = new MediaRecorder(stream, options);

          recorder.ondataavailable = (event) => {
            if (event.data && event.data.size > 0) {
              chunks.push(event.data);
            }
          };

          recorder.onerror = (event) => {
            reject(event.error || new Error("فشل التسجيل"));
          };

          recorder.onstop = () => {
            const finalMimeType = mimeType || recorder.mimeType || "video/webm";
            const blob = new Blob(chunks, { type: finalMimeType });
            const ext = finalMimeType.includes("mp4") ? "mp4" : "webm";

            statusEl.textContent = `انتهى تسجيل الفيديو ${index + 1} من ${totalCount}. جاري الحفظ...`;
            alert(`انتهى تسجيل الفيديو ${index + 1} من ${totalCount}`);

            downloadBlob(blob, `video_${index + 1}.${ext}`);
            resolve();
          };

          alert(`سيبدأ تسجيل الفيديو ${index + 1} من ${totalCount} الآن`);
          statusEl.textContent = `بدأ تسجيل الفيديو ${index + 1} من ${totalCount} لمدة ${durationMs / 1000} ثانية...`;

          recorder.start();

          setTimeout(() => {
            if (recorder.state !== "inactive") {
              recorder.stop();
            }
          }, durationMs);
        } catch (err) {
          reject(err);
        }
      });
    }

    startBtn.addEventListener("click", async () => {
      const count = parseInt(videoCountInput.value, 10);
      const durationSec = parseInt(videoDurationInput.value, 10);

      if (!count || count < 1) {
        alert("أدخل عددًا صحيحًا أكبر من 0");
        return;
      }

      if (!durationSec || durationSec < 1) {
        alert("أدخل مدة صحيحة أكبر من 0");
        return;
      }

      startBtn.disabled = true;

      try {
        statusEl.textContent = "جارٍ فتح الكاميرا الأمامية...";

        if (!stream) {
          await startCamera();
        }

        const durationMs = durationSec * 1000;

        for (let i = 0; i < count; i++) {
          await recordOneVideo(i, durationMs, count);

          if (i < count - 1) {
            await sleep(700);
          }
        }

        statusEl.textContent = "تم تسجيل جميع الفيديوهات بنجاح.";
        alert("تم تسجيل جميع الفيديوهات بنجاح.");
      } catch (err) {
        console.error(err);
        statusEl.textContent = `حدث خطأ: ${err.name || ""} ${err.message || err}`;
        alert(`${err.name || "Error"}: ${err.message || err}`);
      } finally {
        startBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
